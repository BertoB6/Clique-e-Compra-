<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Clique e Compra | Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fc;
            padding-top: 80px; /* Espaço para o header fixo */
        }

        /* ========== HEADER FIXO ========== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #0A1C3A 0%, #0A2A4A 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px solid #D4AF37;
        }

        /* Logo + nome da loja */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-icon {
            font-size: 2rem;
            color: #D4AF37;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
            text-shadow: 1px 1px 0 #0A1C3A;
        }

        .logo-text span {
            color: #D4AF37;
            font-weight: 800;
        }

        /* Botão menu hambúrguer + lupa container */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-hamburger {
            background: #D4AF37;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .menu-hamburger:hover {
            background: #c5a022;
            transform: scale(0.96);
        }

        .menu-hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #0A1C3A;
            border-radius: 3px;
            transition: 0.2s;
        }

        /* Lupa / busca */
        .search-btn {
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .search-btn:hover {
            background: #D4AF37;
            transform: scale(1.05);
        }

        .search-btn i {
            font-size: 1.3rem;
            color: #0A1C3A;
            font-weight: bold;
        }

        /* menu lateral (hambúrguer) */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #0A2A4A;
            z-index: 1100;
            transition: left 0.3s ease;
            box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 2px solid #D4AF37;
        }

        .side-menu.open {
            left: 0;
        }

        .side-menu .close-menu {
            align-self: flex-end;
            background: #D4AF37;
            width: 35px;
            height: 35px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            font-weight: bold;
            color: #0A1C3A;
        }

        .side-menu ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .side-menu ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
            transition: 0.2s;
            display: block;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .side-menu ul li a:hover {
            color: #D4AF37;
            padding-left: 8px;
        }

        /* overlay escuro */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1050;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* barra de pesquisa expandida */
        .search-bar-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            background: white;
            padding: 0.8rem 2rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            z-index: 1001;
            display: none;
            border-bottom: 2px solid #D4AF37;
        }

        .search-bar-container.show {
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: #D4AF37;
        }

        .search-submit {
            background: #0A1C3A;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-submit:hover {
            background: #D4AF37;
            color: #0A1C3A;
        }

        /* Container principal produtos - GRID 2 colunas responsivo */
        .products-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Cards produto quadrados */
        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(10, 28, 58, 0.2);
            border-color: #D4AF37;
        }

        .product-img {
            background-color: #f0f2f5;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* fallback cores */
        .product-info {
            padding: 1.2rem 1rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0A1C3A;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #D4AF37;
            margin: 0.5rem 0;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #4a5568;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        /* Botão Ver mais (abre modal) */
        .btn-vermais {
            background: transparent;
            border: 2px solid #D4AF37;
            color: #0A1C3A;
            font-weight: bold;
            padding: 0.6rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: auto;
            font-size: 0.9rem;
        }

        .btn-vermais:hover {
            background: #D4AF37;
            color: white;
        }

        /* MODAL (ver mais) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 1.8rem;
            text-align: center;
            position: relative;
            border-top: 6px solid #D4AF37;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            font-size: 1.8rem;
            color: #0A1C3A;
            margin-bottom: 1rem;
        }

        .modal-price {
            font-size: 2rem;
            font-weight: bold;
            color: #D4AF37;
            margin: 0.8rem 0;
        }

        .modal-desc {
            color: #2d3748;
            margin: 1rem 0;
            line-height: 1.5;
        }

        .btn-comprar-agora {
            background: #25D366;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-comprar-agora:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            background: #eee;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            background: #0A1C3A;
            color: #D4AF37;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
            border-top: 1px solid #D4AF37;
        }

        @media (max-width: 640px) {
            .header {
                padding: 0.6rem 1rem;
            }
            .logo-text {
                font-size: 1.2rem;
            }
            .products-container {
                gap: 1rem;
                padding: 0 1rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="header">
    <div class="logo-area">
        <i class="fas fa-store logo-icon"></i>
        <div class="logo-text">Clique e <span>Compra</span></div>
    </div>
    <div class="nav-controls">
        <div class="search-btn" id="searchIcon">
            <i class="fas fa-search"></i>
        </div>
        <div class="menu-hamburger" id="menuHamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</header>

<!-- Menu lateral -->
<div class="side-menu" id="sideMenu">
    <div class="close-menu" id="closeMenuBtn">&times;</div>
    <ul>
        <li><a href="#">🏠 Início</a></li>
        <li><a href="#">🔥 Ofertas</a></li>
        <li><a href="#">📦 Categorias</a></li>
        <li><a href="#">💬 Contato WhatsApp</a></li>
        <li><a href="#">⭐ Avaliações</a></li>
    </ul>
</div>
<div class="overlay" id="overlay"></div>

<!-- Barra de busca expansível -->
<div class="search-bar-container" id="searchBar">
    <input type="text" id="searchInput" class="search-input" placeholder="Busque por nome do produto...">
    <button id="searchBtn" class="search-submit">Buscar</button>
</div>

<!-- Grid de produtos -->
<div class="products-container" id="productsGrid"></div>

<footer>
    <p>✨ Clique e Compra Marketplace - Todos os produtos com desconto especial ✨</p>
    <p style="font-size:0.8rem; color:#bbb;">Compre pelo WhatsApp com segurança</p>
</footer>

<!-- Modal ver mais -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3 id="modalTitle">Produto</h3>
        <div id="modalImage" style="font-size:3rem; margin:0.5rem 0;">🛍️</div>
        <div class="modal-price" id="modalPrice">R$ 0,00</div>
        <div class="modal-desc" id="modalDesc">Descrição detalhada</div>
        <button class="btn-comprar-agora" id="modalBuyBtn"><i class="fab fa-whatsapp"></i> Comprar Agora</button>
    </div>
</div>

<script src="produtos.js"></script>
<script src="script.js"></script>
</body>
</html>
